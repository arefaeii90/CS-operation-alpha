<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Alpha – Squad Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --dhl-yellow: #FFCC00;
    --dhl-red: #D40511;
    --cod-dark: #0A0A0A;
    --cod-mid: #141414;
    --cod-panel: #1A1A1A;
    --cod-border: #2A2A2A;
    --alpha-color: #FFCC00;
    --bravo-color: #00BFFF;
    --charlie-color: #39FF14;
    --delta-color: #FF4500;
    --xp-bar: #FFCC00;
    --text-main: #F0F0F0;
    --text-muted: #888;
    --medal-gold: #FFD700;
    --medal-silver: #C0C0C0;
    --medal-bronze: #CD7F32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cod-dark);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(212,5,17,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(255,204,0,0.06) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0D0D0D 0%, #1A0A00 50%, #0D0D0D 100%);
    border-bottom: 2px solid var(--dhl-yellow);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(255,204,0,0.15);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .dhl-badge {
    background: var(--dhl-red);
    color: var(--dhl-yellow);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 14px;
    padding: 6px 12px;
    letter-spacing: 2px;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }
  .op-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--dhl-yellow);
    text-shadow: 0 0 20px rgba(255,204,0,0.5);
    letter-spacing: 3px;
  }
  .op-subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 2px; }
  .header-right { text-align: right; }
  .mission-status { font-size: 11px; color: #39FF14; letter-spacing: 3px; text-transform: uppercase; }
  .mission-status::before { content: '● '; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── MAIN LAYOUT ── */
  main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--dhl-yellow);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--dhl-yellow), transparent); }

  /* ── SQUAD GRID ── */
  .squads-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 32px;
  }

  /* ── SQUAD CARD ── */
  .squad-card {
    background: var(--cod-panel);
    border: 1px solid var(--cod-border);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .squad-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: var(--squad-color);
    box-shadow: 0 0 12px var(--squad-color);
  }
  .squad-card:hover { border-color: var(--squad-color); }

  .squad-header {
    background: rgba(0,0,0,0.4);
    padding: 14px 18px 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--cod-border);
  }
  .squad-name-wrap {}
  .squad-label { font-size: 10px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; }
  .squad-name {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--squad-color);
    text-shadow: 0 0 10px var(--squad-color);
  }
  .squad-motto { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 2px; }
  .squad-rank-badge {
    text-align: center;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--squad-color);
    padding: 8px 14px;
    min-width: 90px;
  }
  .rank-label { font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }
  .rank-name { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--squad-color); font-weight: 700; }

  /* XP area */
  .squad-xp-area { padding: 16px 18px 16px 24px; border-bottom: 1px solid var(--cod-border); }
  .xp-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .xp-total { font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 900; color: var(--squad-color); line-height: 1; }
  .xp-unit { font-size: 13px; color: var(--text-muted); margin-left: 4px; }
  .xp-next { font-size: 11px; color: var(--text-muted); }
  .xp-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }
  .xp-bar-fill {
    height: 100%;
    background: var(--squad-color);
    box-shadow: 0 0 8px var(--squad-color);
    transition: width 0.6s ease;
    position: relative;
  }

  /* Points input zone */
  .squad-actions { padding: 14px 18px 14px 24px; border-bottom: 1px solid var(--cod-border); }
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .xp-action-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--cod-border);
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 10px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    letter-spacing: 0.5px;
  }
  .xp-action-btn:hover {
    border-color: var(--squad-color);
    background: rgba(255,255,255,0.05);
    color: var(--squad-color);
  }
  .xp-action-btn .xp-val { color: var(--squad-color); font-family: 'Orbitron', monospace; font-size: 11px; }
  .custom-xp-row { margin-top: 8px; display: flex; gap: 8px; }
  .custom-xp-input {
    flex: 1;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--cod-border);
    color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .custom-xp-input:focus { border-color: var(--squad-color); }
  .custom-xp-input::placeholder { color: var(--text-muted); }
  .add-xp-btn {
    background: var(--squad-color);
    color: #000;
    border: none;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 7px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .add-xp-btn:hover { opacity: 0.85; }

  /* Medals */
  .squad-medals { padding: 14px 18px 14px 24px; }
  .medals-label { font-size: 10px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
  .medals-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .medal-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .medal-slot:hover { transform: scale(1.08); }
  .medal-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }
  .medal-icon.unlocked { border-color: var(--squad-color); box-shadow: 0 0 10px var(--squad-color); }
  .medal-icon.locked { filter: grayscale(1); opacity: 0.3; border-color: var(--cod-border); }
  .medal-name { font-size: 9px; color: var(--text-muted); text-align: center; max-width: 50px; line-height: 1.2; letter-spacing: 0.5px; }
  .medal-name.unlocked-text { color: var(--squad-color); }

  /* ── LEADERBOARD ── */
  .leaderboard-wrap { margin-bottom: 32px; }
  .leaderboard-table { width: 100%; border-collapse: collapse; }
  .leaderboard-table th {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 16px;
    text-align: left;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--cod-border);
  }
  .leaderboard-table td {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 14px;
    font-weight: 600;
  }
  .leaderboard-table tr:hover td { background: rgba(255,255,255,0.02); }
  .lb-rank { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900; color: var(--text-muted); width: 40px; }
  .lb-rank.first { color: var(--medal-gold); }
  .lb-rank.second { color: var(--medal-silver); }
  .lb-rank.third { color: var(--medal-bronze); }
  .lb-squad-name { font-family: 'Orbitron', monospace; font-size: 13px; }
  .lb-bar-cell { width: 200px; }
  .lb-bar-bg { height: 4px; background: rgba(255,255,255,0.06); }
  .lb-bar-fill { height: 4px; transition: width 0.6s ease; }
  .lb-xp { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 900; text-align: right; }
  .lb-rank-name { font-size: 11px; color: var(--text-muted); }
  .lb-medals-count { font-size: 13px; }

  /* ── RESET ZONE ── */
  .controls-bar {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-bottom: 24px;
  }
  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--cod-border);
    color: var(--text-muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 18px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--dhl-red); color: var(--dhl-red); }
  .ctrl-btn.danger { border-color: var(--dhl-red); color: var(--dhl-red); }
  .ctrl-btn.danger:hover { background: var(--dhl-red); color: #fff; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--cod-panel);
    border-left: 3px solid var(--dhl-yellow);
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    max-width: 300px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast .toast-icon { font-size: 16px; margin-right: 8px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cod-dark); }
  ::-webkit-scrollbar-thumb { background: var(--cod-border); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="dhl-badge">DHL</div>
    <div>
      <div class="op-title">OPERATION ALPHA</div>
      <div class="op-subtitle">Call of Duty · CS Selling Campaign · Tactical Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="mission-status">MISSION ACTIVE</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:2px;">FOCUS. SELL. DOMINATE.</div>
  </div>
</header>

<main>

  <div class="controls-bar">
    <button class="ctrl-btn" onclick="exportSummary()">📋 Export Summary</button>
    <button class="ctrl-btn danger" onclick="confirmReset()">🔄 Reset Campaign</button>
  </div>

  <!-- SQUADS -->
  <div class="section-title">⚔ Squad Command Centers</div>
  <div class="squads-grid" id="squadsGrid"></div>

  <!-- LEADERBOARD -->
  <div class="leaderboard-wrap">
    <div class="section-title">🏆 Tactical Leaderboard</div>
    <div style="background:var(--cod-panel);border:1px solid var(--cod-border);">
      <table class="leaderboard-table" id="leaderboardTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Squad</th>
            <th>XP Progress</th>
            <th style="text-align:right">Total XP</th>
            <th>Rank</th>
            <th>Medals</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>
  </div>

</main>

<div id="toast"><span class="toast-icon"></span><span id="toastMsg"></span></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const SQUADS_CONFIG = [
  { id:'alpha',   name:'SQUAD ALPHA',   sub:'EXPRESS',   motto:'"Speed Wins Wars"',      color:'#FFCC00', emoji:'⚡' },
  { id:'bravo',   name:'SQUAD BRAVO',   sub:'LIGHTNING', motto:'"Strike Fast, Strike Hard"', color:'#00BFFF', emoji:'🌩' },
  { id:'charlie', name:'SQUAD CHARLIE', sub:'AIRBORNE',  motto:'"Sky\'s the Limit"',     color:'#39FF14', emoji:'🦅' },
  { id:'delta',   name:'SQUAD DELTA',   sub:'FALCON',    motto:'"Precision. Execution. Victory."', color:'#FF4500', emoji:'🎯' },
];

const RANKS = [
  { min:0,    max:100,  name:'RECRUIT',    label:'Welcome to the field.' },
  { min:101,  max:250,  name:'SPECIALIST', label:'Emerging tactical talent.' },
  { min:251,  max:500,  name:'CORPORAL',   label:'Proven field operator.' },
  { min:501,  max:750,  name:'SERGEANT',   label:'Experienced logistics leader.' },
  { min:751,  max:1000, name:'LIEUTENANT', label:'Elite performance tier.' },
  { min:1001, max:Infinity, name:'COMMANDER', label:'Master of the mission.' },
];

const ACTIONS = [
  { label:'New Sale Lead (Q)',           xp: 10 },
  { label:'Upsell to Express',           xp: 15 },
  { label:'Insurance Upgrade',           xp: 20 },
  { label:'Combo Bonus (5+ Same Day)',   xp: 20 },
  { label:'First Blood Bonus',           xp: 5  },
  { label:'UAV – Heavy Shipment 30kg+',  xp: 200 },
  { label:'High-Value Target 50kg+',     xp: 200 },
  { label:'Care Package (Multi-Upsell)', xp: 50 },
];

const MEDALS_CONFIG = [
  { id:'firstBlood',  name:'FIRST BLOOD',    icon:'🩸', desc:'First sale of the day' },
  { id:'upsellNinja', name:'UPSELL NINJA',   icon:'🥷', desc:'5 upsells in one shift' },
  { id:'rapidFire',   name:'RAPID FIRE',     icon:'🔥', desc:'3 sales leads in 5 days' },
  { id:'hearts',      name:'HEARTS & MINDS', icon:'💛', desc:'Highest CSAT among squads' },
  { id:'juggernaut',  name:'JUGGERNAUT',     icon:'💪', desc:'Top weekly XP squad' },
];

// ── STATE ─────────────────────────────────────────────────────────────
function loadState() {
  const saved = localStorage.getItem('opAlpha_v2');
  if (saved) return JSON.parse(saved);
  const state = {};
  SQUADS_CONFIG.forEach(s => {
    state[s.id] = { xp: 0, medals: {} };
    MEDALS_CONFIG.forEach(m => state[s.id].medals[m.id] = false);
  });
  return state;
}
function saveState(state) {
  localStorage.setItem('opAlpha_v2', JSON.stringify(state));
}

let STATE = loadState();

function getRank(xp) {
  return RANKS.find(r => xp >= r.min && xp <= r.max) || RANKS[RANKS.length-1];
}

function getXpProgress(xp) {
  const rank = getRank(xp);
  if (rank.max === Infinity) return 100;
  const range = rank.max - rank.min;
  return Math.min(100, Math.round(((xp - rank.min) / range) * 100));
}

function getMedalCount(squadId) {
  return Object.values(STATE[squadId].medals).filter(Boolean).length;
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(icon, msg, color='#FFCC00') {
  const toast = document.getElementById('toast');
  toast.style.borderLeftColor = color;
  document.getElementById('toastMsg').textContent = msg;
  toast.querySelector('.toast-icon').textContent = icon;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── ADD XP ────────────────────────────────────────────────────────────
function addXP(squadId, amount, label) {
  STATE[squadId].xp += amount;
  saveState(STATE);
  renderAll();
  const squad = SQUADS_CONFIG.find(s => s.id === squadId);
  showToast('⚡', `${squad.name}: +${amount} XP — ${label}`, squad.color);
}

// ── TOGGLE MEDAL ──────────────────────────────────────────────────────
function toggleMedal(squadId, medalId) {
  STATE[squadId].medals[medalId] = !STATE[squadId].medals[medalId];
  saveState(STATE);
  renderAll();
  const squad = SQUADS_CONFIG.find(s => s.id === squadId);
  const medal = MEDALS_CONFIG.find(m => m.id === medalId);
  const awarded = STATE[squadId].medals[medalId];
  showToast(
    awarded ? medal.icon : '🔒',
    awarded ? `${squad.name} earned: ${medal.name}!` : `${medal.name} removed`,
    awarded ? squad.color : '#888'
  );
}

// ── RENDER SQUAD CARD ─────────────────────────────────────────────────
function renderSquadCard(squad) {
  const state = STATE[squad.id];
  const rank = getRank(state.xp);
  const progress = getXpProgress(state.xp);
  const nextRank = RANKS[Math.min(RANKS.indexOf(rank)+1, RANKS.length-1)];
  const nextXP = rank.max === Infinity ? '—' : rank.max + ' XP';

  const actionsHTML = ACTIONS.map((a,i) => `
    <button class="xp-action-btn" onclick="addXP('${squad.id}', ${a.xp}, '${a.label}')">
      <span>${a.label}</span>
      <span class="xp-val">+${a.xp}</span>
    </button>
  `).join('');

  const medalsHTML = MEDALS_CONFIG.map(m => {
    const unlocked = state.medals[m.id];
    return `
      <div class="medal-slot" onclick="toggleMedal('${squad.id}','${m.id}')" title="${m.desc}">
        <div class="medal-icon ${unlocked ? 'unlocked' : 'locked'}" style="background:${unlocked ? 'rgba(0,0,0,0.5)' : 'transparent'}">${m.icon}</div>
        <div class="medal-name ${unlocked ? 'unlocked-text' : ''}">${m.name}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="squad-card" style="--squad-color:${squad.color}">
      <div class="squad-header">
        <div class="squad-name-wrap">
          <div class="squad-label">Squad · ${squad.sub}</div>
          <div class="squad-name">${squad.emoji} ${squad.name}</div>
          <div class="squad-motto">${squad.motto}</div>
        </div>
        <div class="squad-rank-badge">
          <div class="rank-label">Current Rank</div>
          <div class="rank-name">${rank.name}</div>
        </div>
      </div>

      <div class="squad-xp-area">
        <div class="xp-row">
          <div><span class="xp-total">${state.xp.toLocaleString()}</span><span class="xp-unit">XP</span></div>
          <div class="xp-next">Next: ${nextXP}</div>
        </div>
        <div class="xp-bar-bg">
          <div class="xp-bar-fill" style="width:${progress}%;background:${squad.color};box-shadow:0 0 8px ${squad.color}"></div>
        </div>
      </div>

      <div class="squad-actions">
        <div style="font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Quick Add XP</div>
        <div class="action-grid">${actionsHTML}</div>
        <div class="custom-xp-row">
          <input class="custom-xp-input" type="number" id="custom_${squad.id}" placeholder="XP amount..." min="1">
          <button class="add-xp-btn" style="background:${squad.color};color:#000" onclick="addCustomXP('${squad.id}')">+ ADD</button>
          <button class="add-xp-btn" style="background:transparent;color:#FF4500;border:1px solid #FF4500" onclick="deductCustomXP('${squad.id}')">− DEDUCT</button>
        </div>
      </div>

      <div class="squad-medals">
        <div class="medals-label">🏅 Achievement Medals — click to award / revoke</div>
        <div class="medals-row">${medalsHTML}</div>
      </div>
    </div>
  `;
}

// ── RENDER LEADERBOARD ────────────────────────────────────────────────
function renderLeaderboard() {
  const sorted = [...SQUADS_CONFIG].sort((a,b) => STATE[b.id].xp - STATE[a.id].xp);
  const maxXP = Math.max(...sorted.map(s => STATE[s.id].xp), 1);
  const rankClass = ['first','second','third',''];

  document.getElementById('leaderboardBody').innerHTML = sorted.map((squad, i) => {
    const xp = STATE[squad.id].xp;
    const rank = getRank(xp);
    const medalCount = getMedalCount(squad.id);
    const barPct = Math.round((xp / maxXP) * 100);
    return `
      <tr>
        <td class="lb-rank ${rankClass[i]}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}</td>
        <td><span class="lb-squad-name" style="color:${squad.color}">${squad.name}</span><br><span style="font-size:11px;color:var(--text-muted)">${squad.sub}</span></td>
        <td class="lb-bar-cell">
          <div class="lb-bar-bg">
            <div class="lb-bar-fill" style="width:${barPct}%;background:${squad.color};box-shadow:0 0 6px ${squad.color}"></div>
          </div>
        </td>
        <td class="lb-xp" style="color:${squad.color}">${xp.toLocaleString()}</td>
        <td class="lb-rank-name">${rank.name}</td>
        <td class="lb-medals-count">${medalCount > 0 ? MEDALS_CONFIG.filter(m => STATE[squad.id].medals[m.id]).map(m=>m.icon).join(' ') : '<span style="color:var(--text-muted);font-size:11px">None yet</span>'}</td>
      </tr>
    `;
  }).join('');
}

// ── CUSTOM XP ─────────────────────────────────────────────────────────
function addCustomXP(squadId) {
  const input = document.getElementById(`custom_${squadId}`);
  const val = parseInt(input.value);
  if (!val || val <= 0) { showToast('⚠️', 'Enter a valid XP amount', '#FF4500'); return; }
  addXP(squadId, val, 'Manual Entry');
  input.value = '';
}

function deductCustomXP(squadId) {
  const input = document.getElementById(`custom_${squadId}`);
  const val = parseInt(input.value);
  if (!val || val <= 0) { showToast('⚠️', 'Enter a valid XP amount', '#FF4500'); return; }
  const current = STATE[squadId].xp;
  STATE[squadId].xp = Math.max(0, current - val);
  saveState(STATE);
  renderAll();
  const squad = SQUADS_CONFIG.find(s => s.id === squadId);
  const actual = current - STATE[squadId].xp;
  showToast('↩️', squad.name + ': −' + actual + ' XP removed', '#FF4500');
  document.getElementById('custom_' + squadId).value = '';
}

// ── RENDER ALL ────────────────────────────────────────────────────────
function renderAll() {
  document.getElementById('squadsGrid').innerHTML = SQUADS_CONFIG.map(renderSquadCard).join('');
  renderLeaderboard();
}

// ── RESET ────────────────────────────────────────────────────────────
function confirmReset() {
  if (confirm('⚠️ RESET ALL SQUAD DATA?\n\nThis will clear all XP and medals for all squads. This cannot be undone.\n\nProceed?')) {
    SQUADS_CONFIG.forEach(s => {
      STATE[s.id] = { xp: 0, medals: {} };
      MEDALS_CONFIG.forEach(m => STATE[s.id].medals[m.id] = false);
    });
    saveState(STATE);
    renderAll();
    showToast('🔄', 'Campaign reset. Good luck, Operators!', '#FF4500');
  }
}

// ── EXPORT ────────────────────────────────────────────────────────────
function exportSummary() {
  const sorted = [...SQUADS_CONFIG].sort((a,b) => STATE[b.id].xp - STATE[a.id].xp);
  let text = '=== OPERATION ALPHA — SQUAD SUMMARY ===\n\n';
  sorted.forEach((s, i) => {
    const rank = getRank(STATE[s.id].xp);
    const medals = MEDALS_CONFIG.filter(m => STATE[s.id].medals[m.id]).map(m => m.name).join(', ') || 'None';
    text += `#${i+1} ${s.name} (${s.sub})\n`;
    text += `   XP: ${STATE[s.id].xp.toLocaleString()} | Rank: ${rank.name}\n`;
    text += `   Medals: ${medals}\n\n`;
  });
  text += 'FOCUS. SELL. DOMINATE.';
  navigator.clipboard.writeText(text).then(() => showToast('📋', 'Summary copied to clipboard!'));
}

// ── INIT ──────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
